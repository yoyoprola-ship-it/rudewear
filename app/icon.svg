<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rudewear favicon: fondo negro + "R" blanca + dot rojo.
       El dot rojo es la firma del brand (aparece en 'Rudewear.' en
       headers y logos). Alta contrast para 16x16 en tab. -->
  <rect width="64" height="64" rx="10" fill="#000000"/>
  <text
    x="26"
    y="50"
    font-family="Arial Black, 'Arial Black', Impact, system-ui, sans-serif"
    font-size="54"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-2">R</text>
  <circle cx="50" cy="46" r="6" fill="#dc2626"/>
</svg>

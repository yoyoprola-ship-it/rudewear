# Firebase App Hosting config para rudewear.
# Los secrets viven en el MISMO Firebase project que Lafayette Market
# (lafayette-market-d64ff) → reutilizamos los secrets ya creados.
#
# Los env vars NEXT_PUBLIC_* se INLINEAN en el bundle del cliente
# durante el build → necesitan estar disponibles en BUILD (además de
# RUNTIME para server components).

runConfig:
  # Cold start OK — subdomain de baja frecuencia (por ahora Coming
  # Soon + admin). Subir minInstances a 1 si algún día importa.
  minInstances: 0
  maxInstances: 3
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  timeoutSeconds: 60

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  # ─── Google Maps (compartidos con Lafayette Market) ────────
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: GOOGLE_MAPS_SERVER_KEY
    secret: GOOGLE_MAPS_SERVER_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_DELIVERY_ORIGIN
    secret: NEXT_PUBLIC_DELIVERY_ORIGIN
    availability:
      - BUILD
      - RUNTIME

  # ─── Stripe (compartidos — misma cuenta que Lafayette) ─────
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME

  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
    availability:
      - RUNTIME

  # ─── Internal server-to-server secret ──────────────────────
  - variable: INTERNAL_API_SECRET
    secret: INTERNAL_API_SECRET
    availability:
      - RUNTIME

  # ─── Twilio (compartidos — misma cuenta que Lafayette) ─────
  # Se usan para notificar al ADMIN_PHONE cuando llega una reserva
  # nueva de delivery. Endpoint: app/api/create-delivery/route.ts.
  # ADMIN_PHONE está exempt del TCPA consent check en Lafayette,
  # y acá lo mandamos fire-and-forget directo a Twilio.
  - variable: TWILIO_ACCOUNT_SID
    secret: TWILIO_ACCOUNT_SID
    availability:
      - RUNTIME

  - variable: TWILIO_AUTH_TOKEN
    secret: TWILIO_AUTH_TOKEN
    availability:
      - RUNTIME

  - variable: TWILIO_PHONE_NUMBER
    secret: TWILIO_PHONE_NUMBER
    availability:
      - RUNTIME

  - variable: ADMIN_PHONE
    secret: ADMIN_PHONE
    availability:
      - RUNTIME

  # ─── Resend (email) — compartidos con Lafayette ────────────
  # Se usan para el 2FA del admin: después del SMS verify, se manda
  # un código 6-dígitos al email del admin para exigir el 2do factor.
  # Endpoint: app/api/admin/2fa-send/route.ts.
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  - variable: EMAIL_FROM
    secret: EMAIL_FROM
    availability:
      - RUNTIME
